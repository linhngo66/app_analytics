version: 2

models:
  - name: dim_video
    description: >
      Video dimension derived from interaction events. One row per video.
      Attributes are taken from the most recent interaction record for that video.
      Join to fct_video_engagement on video_id to enrich with title and duration.
    columns:
      - name: video_id
        description: Unique identifier for the video.
        data_tests:
          - not_null
          - unique
      - name: author_id
        description: Author of the video.
      - name: category_level
        description: Hierarchy level of the category (1=root, 2=parent, 3=leaf).
      - name: category1_id
        description: Root category ID.
      - name: category2_id
        description: Parent category ID.
      - name: category3_id
        description: Leaf-level category ID — join to dim_category for names.
      - name: duration_seconds
        description: Duration of the video in seconds.
      - name: title
        description: Title of the video.
      - name: tag_name
        description: Tag associated with the video.
