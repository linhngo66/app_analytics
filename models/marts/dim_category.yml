version: 2

models:
  - name: dim_category
    description: >
      Category dimension with a fully resolved three-level hierarchy. One row per category node
      (at any level). category1_name_en, category2_name_en, and category3_name_en are all
      resolved on each row; unused levels are NULL. Join from fact tables on category_sk.
    columns:
      - name: category_sk
        description: >
          Natural key for the category node — concat(coalesce(category1_id,0),
          coalesce(category2_id,0), coalesce(category3_id,0)). Matches category_sk
          in fct_interaction for a direct join.
        data_tests:
          - not_null
          - unique
      - name: category_level
        description: Hierarchy level of this node (1=root, 2=parent, 3=leaf).
      - name: category1_id
        description: Root category ID.
      - name: category1_name_en
        description: Root category name in English.
      - name: category2_id
        description: Parent category ID. NULL for level-1 nodes.
      - name: category2_name_en
        description: Parent category name in English. NULL for level-1 nodes.
      - name: category3_id
        description: Leaf category ID. NULL for level-1 and level-2 nodes.
      - name: category3_name_en
        description: Leaf category name in English. NULL for level-1 and level-2 nodes.
