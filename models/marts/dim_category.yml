version: 2

models:
  - name: dim_category
    description: >
      Category dimension with three-level hierarchy exposed as parent_id and root_id.
      Use category_id to join from fact tables; use parent_id and root_id to roll up
      to broader category groups for analysis.
    columns:
      - name: category_sk
        description: Surrogate key for the category, generated from category3_id.
        data_tests:
          - not_null
          - unique
      - name: category3_id
        description: Leaf-level category natural key.
      - name: category_name_en
        description: Category name in English.
      - name: category_name_cn
        description: Category name in Chinese.
      - name: category_level
        description: Hierarchy level (1=root, 2=parent, 3=leaf).
      - name: parent_id
        description: Parent category ID — one level up in the hierarchy.
      - name: root_id
        description: Root category ID — top of the hierarchy.
