version: 2

sources:
  - name: source
    database: app_analytics
    schema: source
    tables:
      - name: interaction
        description: >
          Raw user-video exposure events. One row per time a user was shown a video.
          Boolean flags record any actions taken during that session (like, comment, share, etc.).
      - name: categories_cn_en
        description: >
          Category reference table with three-level hierarchy (root → parent → leaf).
          Includes both Chinese and English names.
          Known data quality issue: 6 level-2 category_ids (233, 239, 338, 350, 354, 368)
          have duplicate rows with conflicting category_name_en values. The Chinese name
          (category_name_cn) is always correct. A defensive dedup is applied in stg_category
          pending a fix at the source.
